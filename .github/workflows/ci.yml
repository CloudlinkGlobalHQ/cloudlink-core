name: Core CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check cloudlink_core/ || true

  test:
    name: Test & Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Syntax check
        run: python -c "import cloudlink_core" && echo "Import OK" || echo "Import check skipped"

      - name: Run test suite with coverage
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=cloudlink_core --cov-report=term-missing --cov-fail-under=0

      - name: Validate JSON schema examples
        run: |
          if [ -f scripts/validate_examples.py ]; then
            python scripts/validate_examples.py
          else
            echo "scripts/validate_examples.py not found, skipping"
          fi

  notify-deploy:
    name: Notify Cloudlink of deploy
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Send deploy event
        run: |
          curl -sf -X POST "${{ secrets.CLOUDLINK_API_URL }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.CLOUDLINK_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "service": "cloudlink-core",
              "version": "${{ github.sha }}",
              "environment": "production",
              "commit_message": ${{ toJSON(github.event.head_commit.message) }}
            }' || echo "Deploy notification failed (non-fatal)"
